services:


  db:
    image: postgres:16
    container_name: voiceops-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-voiceops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voiceops}
      POSTGRES_DB: ${POSTGRES_DB:-voiceops}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: voiceops-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data

  backend:
    build:
      context: ./services/backend
    container_name: voiceops-backend
    restart: unless-stopped
    depends_on:
      - db
      - redis
    env_file:
      - .env
    ports:
      - '8000:8000'
    command: >
      sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./services/backend:/app

  frontend:
    build:
      context: ./services/frontend
    container_name: voiceops-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000/api/v1}
    ports:
      - '3000:3000'
    volumes:
      - ./services/frontend:/app
      - /app/node_modules

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: voiceops-prometheus
    restart: unless-stopped
    ports:
      - '9090:9090'
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

volumes:
  pgdata:
  redisdata:
